name: prune-raw-retention

on:
  schedule:
    - cron: "0 13 * * 0"
  workflow_dispatch:

concurrency:
  group: prune-raw-retention
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Delete options snapshots older than 90 days
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/prune_raw.py --days 90
