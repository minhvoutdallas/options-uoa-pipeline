name: ingest-fundamentals

on:
  schedule:
    # Saturdays 12:00 UTC — fundamentals move on a weekly cadence at most, and
    # weekends dodge yfinance's market-hours load. The daily dbt build picks
    # the new snapshot up on Monday; dim_company lagging a weekend is fine.
    - cron: "0 12 * * 6"
  workflow_dispatch:

concurrency:
  group: ingest-fundamentals
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Ingest fundamentals
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m ingestion.ingest_fundamentals
