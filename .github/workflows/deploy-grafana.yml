name: deploy-grafana

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Upsert data source and dashboard
        env:
          DATABASE_URL: ${{ secrets.GRAFANA_DATABASE_URL || secrets.DATABASE_URL }}
          GRAFANA_URL: ${{ vars.GRAFANA_URL }}
          GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
        run: python scripts/deploy_grafana.py
