version: 2

sources:
  - name: raw
    description: Landing zone written by the Python ingestion jobs. dbt never writes here.
    schema: raw
    loaded_at_field: ingested_at
    freshness:
      # Daily job — allow for weekends/holidays before warning.
      warn_after: {count: 4, period: day}
      error_after: {count: 7, period: day}
    tables:
      - name: option_chains
        description: One JSONB array of trimmed contracts per (day, underlying, expiration).
      - name: underlying_quotes
        description: Full Tradier quote object per (day, underlying).
      - name: fundamentals
        description: Trimmed yfinance company snapshot per (week, symbol).
        freshness:
          warn_after: {count: 10, period: day}
          error_after: {count: 21, period: day}
      - name: ingest_runs
        description: Job run log; surfaced for observability, not modeled.
        freshness: null
