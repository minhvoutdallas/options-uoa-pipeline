# Connection profile. dbt-postgres wants discrete fields, but the pipeline's
# single secret is a DATABASE_URL — scripts/run_dbt.py parses it into these
# DBT_PG_* env vars (works locally off .env and in GitHub Actions).
options_uoa:
  target: prod
  outputs:
    prod:
      type: postgres
      host: "{{ env_var('DBT_PG_HOST') }}"
      port: "{{ env_var('DBT_PG_PORT', '5432') | as_number }}"
      user: "{{ env_var('DBT_PG_USER') }}"
      password: "{{ env_var('DBT_PG_PASSWORD') }}"
      dbname: "{{ env_var('DBT_PG_DBNAME') }}"
      schema: analytics
      sslmode: require
      threads: 4
